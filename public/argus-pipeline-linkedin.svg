<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" font-family="'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C5247"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1F1B17" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg            { fill: #F5EDDC; }
      .process-box   { fill: #FFFFFF; stroke: #D9CFC0; stroke-width: 2; }
      .data-box      { fill: #FAF6EE; stroke: #722F37; stroke-width: 3.5; }
      .title-h1      { font-family: 'Newsreader', Georgia, serif; font-weight: 700; font-size: 64px; fill: #1F1B17; letter-spacing: -2px; }
      .title-sub     { font-size: 20px; fill: #5C5247; letter-spacing: 1.5px; }
      .box-title     { font-family: 'Newsreader', Georgia, serif; font-weight: 600; font-size: 28px; fill: #1F1B17; }
      .box-title-d   { font-family: 'Newsreader', Georgia, serif; font-weight: 700; font-size: 30px; fill: #722F37; }
      .box-sub       { font-size: 17px; fill: #5C5247; }
      .box-detail    { font-size: 15px; fill: #8B7F70; }
      .tag-proc      { font-size: 13px; font-weight: 600; fill: #722F37; letter-spacing: 2px; }
      .tag-data      { font-size: 13px; font-weight: 800; fill: #722F37; letter-spacing: 2.5px; }
      .footer        { font-size: 16px; fill: #5C5247; }
      .footer-em     { font-size: 16px; fill: #722F37; font-weight: 600; }
      .url           { font-family: 'JetBrains Mono', 'Consolas', monospace; font-size: 18px; fill: #1F1B17; font-weight: 500; }
      .arrow         { fill: none; stroke: #5C5247; stroke-width: 2.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" class="bg"/>

  <!-- Top burgundy accent stripe -->
  <rect width="1200" height="10" fill="#722F37"/>

  <!-- ============================================================ -->
  <!-- TITLE -->
  <!-- ============================================================ -->
  <text x="600" y="100" text-anchor="middle" class="title-h1">Argus</text>
  <text x="600" y="135" text-anchor="middle" class="title-sub">M&amp;A DRAFTING &amp; REVIEW · CORRECTIVE RAG PIPELINE</text>
  <line x1="450" y1="158" x2="750" y2="158" stroke="#722F37" stroke-width="2"/>

  <!-- ============================================================ -->
  <!-- STAGE 1: Anonymizer -->
  <!-- ============================================================ -->
  <g transform="translate(300, 200)" filter="url(#shadow)">
    <rect width="600" height="110" rx="12" class="process-box"/>
    <text x="30" y="32" class="tag-proc">① ANONYMIZE</text>
    <text x="30" y="68" class="box-title">Flash-Lite Anonymizer</text>
    <text x="30" y="95" class="box-detail">Replace named entities with stable placeholders. Server-side, in-process only.</text>
  </g>
  <path d="M 600 310 L 600 348" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 2: Embed -->
  <!-- ============================================================ -->
  <g transform="translate(300, 348)" filter="url(#shadow)">
    <rect width="600" height="95" rx="12" class="process-box"/>
    <text x="30" y="32" class="tag-proc">② EMBED</text>
    <text x="30" y="68" class="box-title">Cohere Embed v4 · 1024-dim</text>
    <text x="30" y="86" class="box-detail">Same embedding model used at corpus ingest time</text>
  </g>
  <path d="M 600 443 L 600 481" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 3: Neon pgvector (DATA LAYER) -->
  <!-- ============================================================ -->
  <g transform="translate(300, 481)" filter="url(#shadow)">
    <rect width="600" height="125" rx="12" class="data-box"/>
    <text x="30" y="34" class="tag-data">◆ DATA LAYER · NEON PGVECTOR</text>
    <text x="30" y="72" class="box-title-d">11,266 corpus chunks (HNSW)</text>
    <text x="30" y="98" class="box-sub">22 playbook · 7,067 CUAD · 4,177 MAUD</text>
    <text x="30" y="118" class="box-detail">cosine similarity → top-k candidates</text>
  </g>
  <path d="M 600 606 L 600 644" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 4: Rerank -->
  <!-- ============================================================ -->
  <g transform="translate(300, 644)" filter="url(#shadow)">
    <rect width="600" height="95" rx="12" class="process-box"/>
    <text x="30" y="32" class="tag-proc">③ RE-SCORE</text>
    <text x="30" y="68" class="box-title">Cohere Rerank 3.5</text>
    <text x="30" y="86" class="box-detail">Cross-encoder relevance scoring · catches paraphrases cosine misses</text>
  </g>
  <path d="M 600 739 L 600 777" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 5: Generate -->
  <!-- ============================================================ -->
  <g transform="translate(300, 777)" filter="url(#shadow)">
    <rect width="600" height="110" rx="12" class="process-box"/>
    <text x="30" y="32" class="tag-proc">④ GENERATE</text>
    <text x="30" y="68" class="box-title">Vertex Gemini 2.5 Flash</text>
    <text x="30" y="95" class="box-detail">Hub → structured JSON issue spotter ·  Chat → streamed prose + citations</text>
  </g>
  <path d="M 600 887 L 600 925" class="arrow" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- STAGE 6: Supermemory write (DATA LAYER) -->
  <!-- ============================================================ -->
  <g transform="translate(300, 925)" filter="url(#shadow)">
    <rect width="600" height="110" rx="12" class="data-box"/>
    <text x="30" y="34" class="tag-data">◆ DATA LAYER · SUPERMEMORY</text>
    <text x="30" y="72" class="box-title-d">Persist anonymized memory</text>
    <text x="30" y="95" class="box-detail">kind = chat_exchange / review_summary · session-scoped · anonymized=true</text>
  </g>

  <!-- ============================================================ -->
  <!-- FOOTER -->
  <!-- ============================================================ -->
  <line x1="120" y1="1080" x2="1080" y2="1080" stroke="#D9CFC0" stroke-width="1.5"/>

  <text x="600" y="1115" text-anchor="middle" class="footer">
    Built by <tspan class="footer-em">Nick Battaglia</tspan> · JD/MBA candidate, Indiana University · Class of 2029
  </text>
  <text x="600" y="1150" text-anchor="middle" class="url">lawagent.nickvbattaglia.com</text>
  <text x="600" y="1175" text-anchor="middle" class="box-detail">Flask · Vertex AI · Cohere · Neon Postgres · Cloud Run · v1.1.1 · May 2026</text>
</svg>
