<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDDC"/>
      <stop offset="100%" stop-color="#EFE4CC"/>
    </linearGradient>
    <pattern id="grain" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="#F5EDDC"/>
      <circle cx="1" cy="1" r="0.3" fill="#1F1B17" fill-opacity="0.025"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="8" fill="#722F37"/>

  <!-- Bottom subtle line -->
  <rect x="0" y="622" width="1200" height="2" fill="#D9CFC0"/>

  <!-- Eyebrow -->
  <text x="90" y="155"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="500"
        fill="#722F37"
        letter-spacing="3">
    JD/MBA &#xB7; INDIANA UNIVERSITY
  </text>

  <!-- Name (huge serif) -->
  <text x="90" y="280"
        font-family="'Newsreader', 'Source Serif Pro', 'Georgia', serif"
        font-size="108" font-weight="600"
        fill="#1F1B17"
        letter-spacing="-2.5">
    Nick Battaglia
  </text>

  <!-- Tagline (smaller serif) -->
  <text x="90" y="365"
        font-family="'Newsreader', 'Source Serif Pro', 'Georgia', serif"
        font-size="44" font-weight="400" font-style="italic"
        fill="#5C5247"
        letter-spacing="-0.5">
    Building legal AI for M&amp;A.
  </text>

  <!-- Project name pill -->
  <rect x="90" y="445" width="180" height="42" rx="21"
        fill="rgba(114, 47, 55, 0.10)"
        stroke="rgba(114, 47, 55, 0.30)"
        stroke-width="1"/>
  <text x="180" y="473"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="600"
        fill="#722F37"
        text-anchor="middle">
    Argus
  </text>

  <!-- Tech pills row -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#8B7F70">
    <text x="290" y="473">Vertex Gemini 2.5 Flash</text>
    <text x="540" y="473">&#xB7;</text>
    <text x="560" y="473">Cohere Rerank 3.5</text>
    <text x="755" y="473">&#xB7;</text>
    <text x="775" y="473">Neon pgvector</text>
  </g>

  <!-- URL at bottom -->
  <text x="90" y="575"
        font-family="'JetBrains Mono', 'SF Mono', Consolas, monospace"
        font-size="22" font-weight="500"
        fill="#1F1B17">
    nickvbattaglia.com
  </text>

  <!-- Burgundy decorative bracket on right -->
  <g stroke="#722F37" stroke-width="2" fill="none" opacity="0.65">
    <path d="M 1080 130 L 1110 130 L 1110 500 L 1080 500"/>
  </g>
  <text x="1095" y="320"
        font-family="'Newsreader', 'Source Serif Pro', 'Georgia', serif"
        font-size="14" font-weight="500"
        fill="#722F37"
        text-anchor="middle"
        transform="rotate(90, 1095, 320)"
        letter-spacing="3">
    PORTFOLIO &#xB7; 2026
  </text>
</svg>
